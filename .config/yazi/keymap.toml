# Open shell with '!'
[[mgr.prepend_keymap]]
on   = "!"
run  = 'shell "$SHELL" --block'
desc = "Open $SHELL here"

# Enter directory or open file with 'l'
[[mgr.prepend_keymap]]
on   = "l"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

# Enter directory or open file with '<Enter>'
[[mgr.prepend_keymap]]
on   = [ "<Enter>" ]
run  = "plugin --sync smart-enter"
desc = "Enter the child directory, or open the file"

[[manager.prepend_keymap]]
on   = [ "O" ] # Shift + o
run  = "open"
desc = "Open all selected files"

# Paste into hovered directory with 'p'
[[mgr.prepend_keymap]]
on   = "p"
run  = "plugin --sync smart-paste"
desc = "Paste into the hovered directory or CWD"

[[input.prepend_keymap]]
on   = "<Esc>"
run  = "close"
desc = "Cancel input"

[[mgr.prepend_keymap]]
on   = [ "c", "m" ]
run  = "plugin chmod"
desc = "Chmod on selected files"

[[mgr.prepend_keymap]]
on   = "T"
run  = "plugin toggle-pane min-preview"
desc = "Show or hide the preview pane"
[[mgr.prepend_keymap]]
on   = "T"
run  = "plugin toggle-pane max-preview"
desc = "Maximize or restore the preview pane"

[[mgr.prepend_keymap]]
on = [ "\\" ]
run = [
    "plugin split-tabs spl_toggle",
    "plugin split-tabs spl_preview"
]
desc = "Split-tabs: toggle split tabs mode"
[[mgr.prepend_keymap]]
on = "<Tab>"
run = "plugin split-tabs spl_switch_tab"
desc = "Split-tabs: switch to the other pane"
[[mgr.prepend_keymap]]
on = "P"
run = "plugin split-tabs spl_preview"
desc = "Split-tabs: toggle preview pane"
[[mgr.prepend_keymap]]
on   = [ "<F5>" ]
run  = [
    "yank",
    "plugin split-tabs spl_switch_tab",
    "paste",
    "plugin split-tabs spl_switch_tab"
]
desc = "Copy to the other pane without staying there"
[[mgr.prepend_keymap]]
on   = [ "<F6>" ]
run  = [
    "yank --cut",
    "plugin split-tabs spl_switch_tab",
    "paste",
    "plugin split-tabs spl_switch_tab"
]
desc = "Move to the other pane without staying there"

